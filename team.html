<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الفريق - نظام إدارة المشاريع</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary sticky-top">
        <div class="container-fluid">
            <a class="navbar-brand" href="dashboard.html">
                <i class="fas fa-tasks"></i> نظام إدارة المشاريع
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle" href="#" id="userDropdown" role="button"
                            data-bs-toggle="dropdown">
                            <i class="fas fa-user-circle"></i> <span id="userName">المستخدم</span>
                        </a>
                        <ul class="dropdown-menu dropdown-menu-end" aria-labelledby="userDropdown">
                            <li><a class="dropdown-item" href="#" onclick="logout(); return false;"><i
                                        class="fas fa-sign-out-alt"></i> تسجيل الخروج</a></li>
                        </ul>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container-fluid">
        <div class="row">
            <!-- Sidebar -->
            <nav class="col-md-2 d-md-block bg-light sidebar">
                <div class="position-sticky pt-3">
                    <ul class="nav flex-column">
                        <li class="nav-item">
                            <a class="nav-link" href="dashboard.html">
                                <i class="fas fa-home"></i> الرئيسية
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="projects.html">
                                <i class="fas fa-project-diagram"></i> المشاريع
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="tasks.html">
                                <i class="fas fa-tasks"></i> المهام
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link active" href="team.html">
                                <i class="fas fa-users"></i> الفريق
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="reports.html">
                                <i class="fas fa-chart-bar"></i> التقارير
                            </a>
                        </li>
                    </ul>
                </div>
            </nav>

            <!-- Main Content -->
            <main class="col-md-10 ms-sm-auto px-md-4 main-content">
                <div class="d-flex justify-content-between align-items-center my-4">
                    <h1><i class="fas fa-users"></i> الفريق</h1>
                    <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#addUserModal">
                        <i class="fas fa-user-plus"></i> إضافة عضو
                    </button>
                </div>

                <!-- Team Members Grid -->
                <div class="row" id="teamGrid">
                    <div class="col-12 text-center">
                        <p class="text-muted">جاري التحميل...</p>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <!-- Add User Modal -->
    <div class="modal fade" id="addUserModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title"><i class="fas fa-user-plus"></i> إضافة عضو جديد</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="addUserForm">
                        <div class="mb-3">
                            <label class="form-label">الاسم</label>
                            <input type="text" class="form-control" name="name" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">البريد الإلكتروني</label>
                            <input type="email" class="form-control" name="email" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">كلمة المرور</label>
                            <input type="password" class="form-control" name="password" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">الدور</label>
                            <select class="form-select" name="role">
                                <option value="member">عضو</option>
                                <option value="manager">مدير</option>
                            </select>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">إلغاء</button>
                    <button type="button" class="btn btn-primary" onclick="addUser()">
                        <i class="fas fa-save"></i> إضافة العضو
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/api-client.js"></script>
    <script>
        let allUsers = [];

        /**
         * تحميل أعضاء الفريق
         */
        async function loadTeam() {
            try {
                const result = await api.getUsers();

                if (result.success) {
                    allUsers = result.data;
                    displayTeam(allUsers);
                }
            } catch (error) {
                console.error('Error loading team:', error);
            }
        }

        /**
         * عرض أعضاء الفريق
         */
        function displayTeam(users) {
            const grid = document.getElementById('teamGrid');

            if (users.length === 0) {
                grid.innerHTML = '<div class="col-12"><p class="text-muted text-center">لا يوجد أعضاء في الفريق</p></div>';
                return;
            }

            const roleLabels = {
                'admin': 'مسؤول',
                'manager': 'مدير',
                'member': 'عضو'
            };

            const roleColors = {
                'admin': 'danger',
                'manager': 'warning',
                'member': 'info'
            };

            grid.innerHTML = users.map(user => `
                <div class="col-md-6 col-lg-4 mb-4">
                    <div class="card h-100">
                        <div class="card-body text-center">
                            <div class="mb-3">
                                <div style="width: 80px; height: 80px; margin: 0 auto; background: linear-gradient(135deg, #667eea, #764ba2); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-size: 32px;">
                                    <i class="fas fa-user"></i>
                                </div>
                            </div>
                            
                            <h5 class="card-title">${user.name}</h5>
                            <p class="text-muted mb-2">${user.email}</p>
                            
                            <div class="mb-3">
                                <span class="badge bg-${roleColors[user.role]}">${roleLabels[user.role]}</span>
                                ${user.isActive ? '<span class="badge bg-success">نشط</span>' : '<span class="badge bg-secondary">غير نشط</span>'}
                            </div>

                            <small class="text-muted d-block">
                                <i class="fas fa-calendar"></i> انضم في ${formatDateArabic(user.created_at)}
                            </small>
                        </div>
                        <div class="card-footer bg-light">
                            <div class="btn-group w-100" role="group">
                                <button type="button" class="btn btn-sm btn-outline-primary" onclick="editUser('${user._id}')">
                                    <i class="fas fa-edit"></i> تعديل
                                </button>
                                <button type="button" class="btn btn-sm btn-outline-danger" onclick="removeUser('${user._id}')">
                                    <i class="fas fa-trash"></i> حذف
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        /**
         * إضافة عضو جديد
         */
        async function addUser() {
            const form = document.getElementById('addUserForm');
            const formData = new FormData(form);
            const data = Object.fromEntries(formData);

            try {
                // Use api.createUser instead of fetch
                const result = await api.createUser(data);

                if (result.success) {
                    showAlert(`تم إضافة العضو ${data.name} بنجاح`, 'success');
                    form.reset();

                    // Properly close modal and return focus
                    const modalElement = document.getElementById('addUserModal');
                    const modalInstance = bootstrap.Modal.getInstance(modalElement);
                    if (modalInstance) {
                        modalInstance.hide();
                        setTimeout(() => {
                            document.querySelector('[data-bs-target="#addUserModal"]').focus();
                        }, 100);
                    }

                    loadTeam();
                } else {
                    showAlert(result.message || 'حدث خطأ أثناء إضافة العضو', 'danger');
                }
            } catch (error) {
                showAlert('حدث خطأ أثناء إضافة العضو: ' + error.message, 'danger');
            }
        }

        /**
         * تعديل عضو
         */
        async function editUser(userId) {
            console.log('Editing user:', userId);
            const user = allUsers.find(u => u._id === userId || u._id.toString() === userId);
            console.log('Found user:', user);

            if (!user) {
                showAlert('المستخدم غير موجود', 'danger');
                return;
            }

            // Simple prompt for editing (can be improved with modal)
            const newName = prompt('الاسم الجديد:', user.name);
            if (!newName) return;

            try {
                console.log('Updating user with data:', { user_id: userId, name: newName });
                const result = await api.updateUser({
                    user_id: userId,
                    name: newName
                });

                if (result.success) {
                    showAlert('تم تحديث بيانات العضو بنجاح', 'success');
                    loadTeam();
                } else {
                    showAlert(result.message || 'حدث خطأ أثناء التحديث', 'danger');
                }
            } catch (error) {
                console.error('Update error:', error);
                showAlert('حدث خطأ أثناء التحديث: ' + error.message, 'danger');
            }
        }

        /**
         * حذف عضو
         */
        async function removeUser(userId) {
            if (!confirm('هل أنت متأكد من حذف هذا العضو؟')) return;

            try {
                const result = await api.deleteUser(userId);

                if (result.success) {
                    showAlert('تم حذف العضو بنجاح', 'success');
                    loadTeam();
                } else {
                    showAlert(result.message || 'حدث خطأ أثناء الحذف', 'danger');
                }
            } catch (error) {
                showAlert('حدث خطأ أثناء الحذف: ' + error.message, 'danger');
            }
        }

        // تحميل الفريق عند فتح الصفحة
        document.addEventListener('DOMContentLoaded', loadTeam);

        // Helper functions
        function showAlert(message, type = 'info') {
            const alertHtml = `
                <div class="alert alert-${type} alert-dismissible fade show" role="alert">
                    ${message}
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
            `;

            let container = document.getElementById('alertsContainer');
            if (!container) {
                container = document.createElement('div');
                container.id = 'alertsContainer';
                document.querySelector('.main-content').insertBefore(container, document.querySelector('.main-content').firstChild);
            }

            container.innerHTML = alertHtml;
            setTimeout(() => {
                container.innerHTML = '';
            }, 5000);
        }

        function formatDateArabic(dateString) {
            if (!dateString) return '';
            const date = new Date(dateString);
            const months = {
                '0': 'يناير', '1': 'فبراير', '2': 'مارس',
                '3': 'أبريل', '4': 'مايو', '5': 'يونيو',
                '6': 'يوليو', '7': 'أغسطس', '8': 'سبتمبر',
                '9': 'أكتوبر', '10': 'نوفمبر', '11': 'ديسمبر'
            };
            return `${date.getDate()} ${months[date.getMonth()]} ${date.getFullYear()}`;
        }
    </script>
</body>

</html>
