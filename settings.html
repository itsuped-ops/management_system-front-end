    <!-- Sidebar -->
    <div class="sidebar">
        <div class="list-group list-group-flush">
            <a class="list-group-item list-group-item-action" href="dashboard.html">
                <i class="fas fa-home"></i> الرئيسية
            </a>
            <a class="list-group-item list-group-item-action" href="projects.html">
                <i class="fas fa-briefcase"></i> المشاريع
            </a>
            <a class="list-group-item list-group-item-action" href="tasks.html">
                <i class="fas fa-tasks"></i> المهام
            </a>
            <a class="list-group-item list-group-item-action" href="team.html">
                <i class="fas fa-users"></i> أعضاء الفريق
            </a>
            <a class="list-group-item list-group-item-action" href="reports.html">
                <i class="fas fa-chart-bar"></i> التقارير
            </a>

                <i class="fas fa-cog"></i> الإعدادات
            </a>
        </div>

    <!-- Main Content -->
    <div class="main-content">
        <div class="container-fluid">
            <h1><i class="fas fa-cog"></i> الإعدادات</h1>

            <!-- Alerts Container -->
            <div id="alertsContainer"></div>

            <div class="row">
                <!-- Profile Settings -->
                <div class="col-md-6 mb-4">
                    <div class="card">
                        <div class="card-header">
                            <h5><i class="fas fa-user"></i> الملف الشخصي</h5>
                        </div>
                        <div class="card-body">
                            <form id="profileForm">
                                <div class="mb-3">
                                    <label class="form-label">الاسم الكامل</label>
                                    <input type="text" class="form-control" id="profileName" required>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">البريد الإلكتروني</label>
                                    <input type="email" class="form-control" id="profileEmail" required>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">الدور</label>
                                    <input type="text" class="form-control" id="profileRole" disabled>
                                </div>
                                <button type="submit" class="btn btn-primary">
                                    <i class="fas fa-save"></i> حفظ التغييرات
                                </button>
                            </form>
                        </div>
                    </div>
                </div>

                <!-- Change Password -->
                <div class="col-md-6 mb-4">
                    <div class="card">
                        <div class="card-header">
                            <h5><i class="fas fa-lock"></i> تغيير كلمة المرور</h5>
                        </div>
                        <div class="card-body">
                            <form id="passwordForm">
                                <div class="mb-3">
                                    <label class="form-label">كلمة المرور الحالية</label>
                                    <input type="password" class="form-control" id="currentPassword" required>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">كلمة المرور الجديدة</label>
                                    <input type="password" class="form-control" id="newPassword" required>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">تأكيد كلمة المرور</label>
                                    <input type="password" class="form-control" id="confirmPassword" required>
                                </div>
                                <button type="submit" class="btn btn-primary">
                                    <i class="fas fa-key"></i> تحديث كلمة المرور
                                </button>
                            </form>
                        </div>
                    </div>
                </div>

                <!-- System Settings -->
                <div class="col-md-6 mb-4">
                    <div class="card">
                        <div class="card-header">
                            <h5><i class="fas fa-sliders-h"></i> إعدادات النظام</h5>
                        </div>
                        <div class="card-body">
                            <div class="mb-3">
                                <label class="form-label">اللغة</label>
                                <select class="form-select" id="languageSelect">
                                    <option value="ar" selected>العربية</option>
                                    <option value="en">English</option>
                                </select>
                            </div>
                            <div class="mb-3">
                                <div class="form-check form-switch">
                                    <input class="form-check-input" type="checkbox" id="notificationsEnabled" checked>
                                    <label class="form-check-label" for="notificationsEnabled">
                                        تفعيل الإشعارات
                                    </label>
                                </div>
                            </div>
                            <div class="mb-3">
                                <div class="form-check form-switch">
                                    <input class="form-check-input" type="checkbox" id="darkModeToggle">
                                    <label class="form-check-label" for="darkModeToggle">
                                        الوضع الداكن
                                    </label>
                                </div>
                            </div>
                            <button type="button" class="btn btn-primary" onclick="saveSystemSettings()">
                                <i class="fas fa-save"></i> حفظ إعدادات النظام
                            </button>
                        </div>
                    </div>
                </div>

                <!-- Account Info -->
                <div class="col-md-6 mb-4">
                    <div class="card">
                        <div class="card-header">
                            <h5><i class="fas fa-info-circle"></i> معلومات الحساب</h5>
                        </div>
                        <div class="card-body">
                            <div class="mb-3">
                                <label class="form-label">معرف المستخدم</label>
                                <input type="text" class="form-control" id="userId" disabled>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">تاريخ الإنشاء</label>
                                <input type="text" class="form-control" id="userCreatedAt" disabled>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">آخر دخول</label>
                                <input type="text" class="form-control" id="lastLogin" disabled>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/api-client.js"></script>
    <script>
        let currentUser = null;

        // Check authentication on load
        window.addEventListener('DOMContentLoaded', async () => {
            await checkAuth();
            await loadUserProfile();
        });

        /**
         * Check if user is authenticated
         */
        async function checkAuth() {
            const token = localStorage.getItem('token');
            if (!token) {
                window.location.href = 'login.html';
                return;
            }

            try {
                const result = await api.getProfile();
                if (result.success && result.data) {
                    currentUser = result.data;
                    document.getElementById('userName').textContent = currentUser.name;
                } else {
                    localStorage.removeItem('token');
                    window.location.href = 'login.html';
                }
            } catch (error) {
                console.error('Auth check error:', error);
                localStorage.removeItem('token');
                window.location.href = 'login.html';
            }
        }

        /**
         * Load user profile data
         */
        async function loadUserProfile() {
            if (!currentUser) return;

            document.getElementById('profileName').value = currentUser.name || '';
            document.getElementById('profileEmail').value = currentUser.email || '';
            document.getElementById('profileRole').value = currentUser.role || 'member';

            // Account info
            document.getElementById('userId').value = currentUser._id || currentUser.user_id || 'N/A';
            document.getElementById('userCreatedAt').value = formatDateArabic(currentUser.created_at) || 'N/A';
            document.getElementById('lastLogin').value = 'N/A';
        }

        /**
         * Update profile
         */
        document.getElementById('profileForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const data = {
                name: document.getElementById('profileName').value,
                email: document.getElementById('profileEmail').value
            };

            try {
                const result = await api.updateProfile(data);

                if (result.success) {
                    showAlert('تم تحديث الملف الشخصي بنجاح', 'success');
                    currentUser.name = data.name;
                    currentUser.email = data.email;
                    document.getElementById('userName').textContent = currentUser.name;
                } else {
                    showAlert(result.message || 'حدث خطأ أثناء التحديث', 'danger');
                }
            } catch (error) {
                showAlert('حدث خطأ: ' + error.message, 'danger');
            }
        });

        /**
         * Change password
         */
        document.getElementById('passwordForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const currentPassword = document.getElementById('currentPassword').value;
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            if (newPassword !== confirmPassword) {
                showAlert('كلمات المرور غير متطابقة', 'danger');
                return;
            }

            if (newPassword.length < 6) {
                showAlert('كلمة المرور يجب أن تكون 6 أحرف على الأقل', 'danger');
                return;
            }

            try {
                const result = await api.changePassword({
                    current_password: currentPassword,
                    new_password: newPassword
                });

                if (result.success) {
                    showAlert('تم تغيير كلمة المرور بنجاح', 'success');
                    document.getElementById('passwordForm').reset();
                } else {
                    showAlert(result.message || 'حدث خطأ أثناء تغيير كلمة المرور', 'danger');
                }
            } catch (error) {
                showAlert('حدث خطأ: ' + error.message, 'danger');
            }
        });

        /**
         * Save system settings
         */
        async function saveSystemSettings() {
            const language = document.getElementById('languageSelect').value;
            const notifications = document.getElementById('notificationsEnabled').checked;
            const darkMode = document.getElementById('darkModeToggle').checked;

            localStorage.setItem('language', language);
            localStorage.setItem('notifications', notifications);
            localStorage.setItem('darkMode', darkMode);

            showAlert('تم حفظ إعدادات النظام', 'success');
        }

        /**
         * Show alert message
         */
        function showAlert(message, type = 'info') {
            const alertHtml = `
                <div class="alert alert-${type} alert-dismissible fade show" role="alert">
                    ${message}
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
            `;

            let container = document.getElementById('alertsContainer');
            if (!container) {
                container = document.createElement('div');
                container.id = 'alertsContainer';
                document.querySelector('.main-content').insertBefore(container, document.querySelector('.main-content').firstChild);
            }

            container.innerHTML = alertHtml;
            setTimeout(() => {
                container.innerHTML = '';
            }, 5000);
        }

        /**
         * Format date in Arabic
         */
        function formatDateArabic(dateString) {
            if (!dateString) return '';
            const date = new Date(dateString);
            return date.toLocaleDateString('ar-EG', {
                year: 'numeric',
                month: 'long',
                day: 'numeric',
                hour: '2-digit',
                minute: '2-digit'
            });
        }

        /**
         * Logout
         */
        function logout() {
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            window.location.href = 'login.html';
        }
    </script>
</body>
