<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تفاصيل المشروع - نظام إدارة المشاريع</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary sticky-top">
        <div class="container-fluid">
            <a class="navbar-brand" href="dashboard.html">
                <i class="fas fa-tasks"></i> نظام إدارة المشاريع
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle" href="#" id="userDropdown" role="button"
                            data-bs-toggle="dropdown">
                            <i class="fas fa-user-circle"></i> <span id="userName">المستخدم</span>
                        </a>
                        <ul class="dropdown-menu dropdown-menu-end" aria-labelledby="userDropdown">
                            <li><a class="dropdown-item" href="#" onclick="logout(); return false;"><i
                                        class="fas fa-sign-out-alt"></i> تسجيل الخروج</a></li>
                        </ul>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container-fluid">
        <div class="row">
            <!-- Sidebar -->
            <nav class="col-md-2 d-md-block bg-light sidebar">
                <div class="position-sticky pt-3">
                    <ul class="nav flex-column">
                        <li class="nav-item">
                            <a class="nav-link" href="dashboard.html">
                                <i class="fas fa-home"></i> الرئيسية
                            </a>
                        </li>
                        <li class="nav-item active">
                            <a class="nav-link" href="projects.html">
                                <i class="fas fa-project-diagram"></i> المشاريع
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="tasks.html">
                                <i class="fas fa-tasks"></i> المهام
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="team.html">
                                <i class="fas fa-users"></i> الفريق
                            </a>
                        </li>
                    </ul>
                </div>
            </nav>

            <!-- Main Content -->
            <main class="col-md-10 ms-sm-auto px-md-4 main-content">
                <div class="d-flex justify-content-between align-items-center my-4">
                    <h1><i class="fas fa-project-diagram"></i> تفاصيل المشروع</h1>
                    <button class="btn btn-primary" onclick="window.location.href='tasks.html'">
                        <i class="fas fa-plus"></i> إضافة مهمة
                    </button>
                </div>

                <!-- Project Info -->
                <div class="row mb-4">
                    <div class="col-md-12">
                        <div class="card">
                            <div class="card-body">
                                <h2 id="projectName">جاري التحميل...</h2>
                                <p id="projectDescription" class="text-muted"></p>
                                <div class="row">
                                    <div class="col-md-3">
                                        <strong>الحالة:</strong>
                                        <span id="projectStatus" class="badge"></span>
                                    </div>
                                    <div class="col-md-3">
                                        <strong>تاريخ البداية:</strong>
                                        <span id="projectStartDate"></span>
                                    </div>
                                    <div class="col-md-3">
                                        <strong>تاريخ النهاية:</strong>
                                        <span id="projectEndDate"></span>
                                    </div>
                                    <div class="col-md-3">
                                        <strong>نسبة الإنجاز:</strong>
                                        <span id="projectProgress"></span>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Tasks Section -->
                <div class="row">
                    <div class="col-md-12">
                        <div class="card">
                            <div class="card-header d-flex justify-content-between align-items-center">
                                <h5 class="mb-0"><i class="fas fa-tasks"></i> مهام المشروع</h5>
                            </div>
                            <div class="card-body">
                                <div id="projectTasksList">
                                    <p class="text-muted text-center">جاري التحميل...</p>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/api-client.js"></script>
    <script>
        let projectId = null;

        // Get project ID from URL
        function getProjectIdFromURL() {
            const params = new URLSearchParams(window.location.search);
            projectId = params.get('id');
            if (!projectId) {
                window.location.href = 'projects.html';
            }
        }

        async function loadProjectDetails() {
            try {
                const result = await api.getProject(projectId);
                if (result.success) {
                    const project = result.data;
                    document.getElementById('projectName').textContent = project.projectName || project.project_name;
                    document.getElementById('projectDescription').textContent = project.description || 'بدون وصف';
                    document.getElementById('projectStatus').textContent = getStatusLabel(project.status);
                    document.getElementById('projectStatus').className = `badge bg-${getStatusColor(project.status)}`;
                    document.getElementById('projectStartDate').textContent = formatDateArabic(project.startDate);
                    document.getElementById('projectEndDate').textContent = formatDateArabic(project.endDate);
                    document.getElementById('projectProgress').textContent = project.progress ? `${project.progress}%` : '0%';
                }
            } catch (error) {
                console.error('Error loading project:', error);
            }
        }

        async function loadProjectTasks() {
            try {
                const result = await api.getTasks({ project_id: projectId });
                if (result.success) {
                    const tasks = result.data;
                    const tasksList = document.getElementById('projectTasksList');

                    if (tasks.length === 0) {
                        tasksList.innerHTML = '<p class="text-muted text-center">لا توجد مهام في هذا المشروع</p>';
                        return;
                    }

                    tasksList.innerHTML = `
                        <table class="table table-hover">
                            <thead>
                                <tr>
                                    <th>المهمة</th>
                                    <th>الحالة</th>
                                    <th>الأولوية</th>
                                    <th>الموعد</th>
                                    <th>الموكل إليه</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${tasks.map(task => `
                                    <tr>
                                        <td><strong>${task.task_title}</strong></td>
                                        <td>${getStatusBadge(task.status)}</td>
                                        <td>${getPriorityBadge(task.priority)}</td>
                                        <td>${formatDateArabic(task.deadline)}</td>
                                        <td>${task.assigned_to_name || 'غير معين'}</td>
                                    </tr>
                                `).join('')}
                            </tbody>
                        </table>
                    `;
                }
            } catch (error) {
                console.error('Error loading tasks:', error);
            }
        }

        function getStatusLabel(status) {
            const labels = {
                'planning': 'في مرحلة التخطيط',
                'in_progress': 'قيد التنفيذ',
                'completed': 'مكتملة',
                'on_hold': 'معلقة'
            };
            return labels[status] || status;
        }

        function getStatusColor(status) {
            const colors = {
                'planning': 'secondary',
                'in_progress': 'primary',
                'completed': 'success',
                'on_hold': 'warning'
            };
            return colors[status] || 'secondary';
        }

        function getStatusBadge(status) {
            return `<span class="badge bg-${getStatusColor(status)}">${getStatusLabel(status)}</span>`;
        }

        function getPriorityBadge(priority) {
            const priorities = {
                'low': { label: 'منخفضة', color: 'success' },
                'medium': { label: 'متوسطة', color: 'info' },
                'high': { label: 'عالية', color: 'warning' },
                'urgent': { label: 'عاجلة', color: 'danger' }
            };
            const p = priorities[priority] || priorities['medium'];
            return `<span class="badge bg-${p.color}">${p.label}</span>`;
        }

        function formatDateArabic(dateString) {
            if (!dateString) return '';
            const date = new Date(dateString);
            const months = {
                '0': 'يناير', '1': 'فبراير', '2': 'مارس',
                '3': 'أبريل', '4': 'مايو', '5': 'يونيو',
                '6': 'يوليو', '7': 'أغسطس', '8': 'سبتمبر',
                '9': 'أكتوبر', '10': 'نوفمبر', '11': 'ديسمبر'
            };
            return `${date.getDate()} ${months[date.getMonth()]} ${date.getFullYear()}`;
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            getProjectIdFromURL();
            loadProjectDetails();
            loadProjectTasks();

            // Update user name
            const user = getCurrentUser();
            if (user) {
                document.getElementById('userName').textContent = user.name || 'المستخدم';
            }
        });
    </script>
</body>

</html>
