<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المشاريع - نظام إدارة المشاريع</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary sticky-top">
        <div class="container-fluid">
            <a class="navbar-brand" href="dashboard.html">
                <i class="fas fa-tasks"></i> نظام إدارة المشاريع
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle" href="#" id="userDropdown" role="button"
                            data-bs-toggle="dropdown">
                            <i class="fas fa-user-circle"></i> <span id="userName">المستخدم</span>
                        </a>
                        <ul class="dropdown-menu dropdown-menu-end" aria-labelledby="userDropdown">
                            <li><a class="dropdown-item" href="#" onclick="logout(); return false;"><i
                                        class="fas fa-sign-out-alt"></i> تسجيل الخروج</a></li>
                        </ul>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container-fluid">
        <div class="row">
            <!-- Sidebar -->
            <nav class="col-md-2 d-md-block bg-light sidebar">
                <div class="position-sticky pt-3">
                    <ul class="nav flex-column">
                        <li class="nav-item">
                            <a class="nav-link" href="dashboard.html">
                                <i class="fas fa-home"></i> الرئيسية
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link active" href="projects.html">
                                <i class="fas fa-project-diagram"></i> المشاريع
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="tasks.html">
                                <i class="fas fa-tasks"></i> المهام
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="team.html">
                                <i class="fas fa-users"></i> الفريق
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="reports.html">
                                <i class="fas fa-chart-bar"></i> التقارير
                            </a>
                        </li>
                    </ul>
                </div>
            </nav>

            <!-- Main Content -->
            <main class="col-md-10 ms-sm-auto px-md-4 main-content">
                <div class="d-flex justify-content-between align-items-center my-4">
                    <h1><i class="fas fa-project-diagram"></i> المشاريع</h1>
                    <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#newProjectModal">
                        <i class="fas fa-plus"></i> مشروع جديد
                    </button>
                </div>

                <!-- Filter -->
                <div class="row mb-4">
                    <div class="col-md-4">
                        <select class="form-select" id="statusFilter" onchange="filterProjects()">
                            <option value="">جميع المشاريع</option>
                            <option value="planning">في مرحلة التخطيط</option>
                            <option value="in_progress">قيد التنفيذ</option>
                            <option value="completed">مكتملة</option>
                            <option value="on_hold">معلقة</option>
                        </select>
                    </div>
                </div>

                <!-- Projects Grid -->
                <div class="row" id="projectsGrid">
                    <div class="col-12 text-center">
                        <p class="text-muted">جاري التحميل...</p>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <!-- New Project Modal -->
    <div class="modal fade" id="newProjectModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title"><i class="fas fa-plus"></i> مشروع جديد</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="newProjectForm">
                        <div class="mb-3">
                            <label class="form-label">اسم المشروع</label>
                            <input type="text" class="form-control" name="project_name" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">الوصف</label>
                            <textarea class="form-control" name="description" rows="3"></textarea>
                        </div>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">تاريخ البداية</label>
                                <input type="date" class="form-control" name="start_date">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">تاريخ النهاية</label>
                                <input type="date" class="form-control" name="end_date">
                            </div>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">إلغاء</button>
                    <button type="button" class="btn btn-primary" onclick="createProject()">
                        <i class="fas fa-save"></i> إنشاء المشروع
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Edit Project Modal -->
    <div class="modal fade" id="editProjectModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title"><i class="fas fa-edit"></i> تعديل المشروع</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="editProjectForm">
                        <input type="hidden" name="project_id" id="editProjectId">
                        <div class="mb-3">
                            <label class="form-label">اسم المشروع</label>
                            <input type="text" class="form-control" name="project_name" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">الوصف</label>
                            <textarea class="form-control" name="description" rows="3"></textarea>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">الحالة</label>
                            <select class="form-select" name="status">
                                <option value="planning">في مرحلة التخطيط</option>
                                <option value="in_progress">قيد التنفيذ</option>
                                <option value="completed">مكتملة</option>
                                <option value="on_hold">معلقة</option>
                            </select>
                        </div>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">تاريخ البداية</label>
                                <input type="date" class="form-control" name="start_date">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">تاريخ النهاية</label>
                                <input type="date" class="form-control" name="end_date">
                            </div>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">إلغاء</button>
                    <button type="button" class="btn btn-primary" onclick="updateProject()">
                        <i class="fas fa-save"></i> حفظ التغييرات
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/api-client.js"></script>
    <script>
        let allProjects = [];

        /**
         * تحميل المشاريع
         */
        async function loadProjects() {
            try {
                const result = await api.getProjects();

                if (result.success) {
                    allProjects = result.data;
                    displayProjects(allProjects);
                } else {
                    document.getElementById('projectsGrid').innerHTML = '<p class="text-danger">حدث خطأ في تحميل المشاريع</p>';
                }
            } catch (error) {
                console.error('Error loading projects:', error);
                document.getElementById('projectsGrid').innerHTML = '<p class="text-danger">حدث خطأ في تحميل المشاريع</p>';
            }
        }

        /**
         * عرض المشاريع
         */
        function displayProjects(projects) {
            const grid = document.getElementById('projectsGrid');

            if (projects.length === 0) {
                grid.innerHTML = '<div class="col-12"><p class="text-muted text-center">لا توجد مشاريع</p></div>';
                return;
            }

            grid.innerHTML = projects.map(project => `
                <div class="col-md-6 col-lg-4 mb-4">
                    <div class="card h-100">
                        <div class="card-body">
                            <h5 class="card-title">
                                <i class="fas fa-project-diagram"></i> ${project.project_name}
                            </h5>
                            <p class="card-text text-muted">${project.description || 'بدون وصف'}</p>
                            
                            <div class="mb-3">
                                ${getStatusBadge(project.status)}
                            </div>

                            <div class="mb-3">
                                <small class="text-muted">
                                    <i class="fas fa-tasks"></i> ${project.completed_tasks}/${project.total_tasks} مهام
                                </small>
                                <div class="progress mt-2" style="height: 8px;">
                                    <div class="progress-bar" style="width: ${project.progress}%"></div>
                                </div>
                            </div>

                            <small class="text-muted d-block mb-3">
                                <i class="fas fa-calendar"></i> ${formatDateArabic(project.start_date)} - ${formatDateArabic(project.end_date)}
                            </small>
                        </div>
                        <div class="card-footer bg-light">
                            <div class="btn-group w-100" role="group"
                            >
                                <a href="project-details.html?id=${project.project_id}" class="btn btn-sm btn-outline-primary">
                                    <i class="fas fa-eye"></i> عرض
                                </a>
                                <button type="button" class="btn btn-sm btn-outline-warning" onclick="editProjectModal(${project.project_id})">
                                    <i class="fas fa-edit"></i> تعديل
                                </button>
                                <button type="button" class="btn btn-sm btn-outline-danger" onclick="deleteProject(${project.project_id})">
                                    <i class="fas fa-trash"></i> حذف
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        /**
         * تصفية المشاريع
         */
        function filterProjects() {
            const status = document.getElementById('statusFilter').value;
            const filtered = status ? allProjects.filter(p => p.status === status) : allProjects;
            displayProjects(filtered);
        }

        /**
         * إنشاء مشروع جديد
         */
        async function createProject() {
            const form = document.getElementById('newProjectForm');
            const formData = new FormData(form);
            const data = Object.fromEntries(formData);

            try {
                const result = await api.createProject(data);

                if (result.success) {
                    showAlert('تم إنشاء المشروع بنجاح', 'success');
                    form.reset();

                    // Properly close modal and return focus
                    const modalElement = document.getElementById('newProjectModal');
                    const modalInstance = bootstrap.Modal.getInstance(modalElement);
                    if (modalInstance) {
                        modalInstance.hide();
                        setTimeout(() => {
                            document.querySelector('[data-bs-target="#newProjectModal"]').focus();
                        }, 100);
                    }

                    loadProjects();
                } else {
                    showAlert(result.message || 'حدث خطأ أثناء إنشاء المشروع', 'danger');
                }
            } catch (error) {
                showAlert('حدث خطأ أثناء إنشاء المشروع: ' + error.message, 'danger');
            }
        }

        /**
         * فتح نافذة تعديل المشروع
         */
        async function editProjectModal(projectId) {
            const project = allProjects.find(p => p.project_id === projectId);
            if (!project) return;

            document.getElementById('editProjectId').value = projectId;
            document.querySelector('#editProjectForm input[name="project_name"]').value = project.project_name;
            document.querySelector('#editProjectForm textarea[name="description"]').value = project.description || '';
            document.querySelector('#editProjectForm select[name="status"]').value = project.status;
            document.querySelector('#editProjectForm input[name="start_date"]').value = project.start_date;
            document.querySelector('#editProjectForm input[name="end_date"]').value = project.end_date;

            new bootstrap.Modal(document.getElementById('editProjectModal')).show();
        }

        /**
         * تحديث المشروع
         */
        async function updateProject() {
            const form = document.getElementById('editProjectForm');
            const formData = new FormData(form);
            const data = Object.fromEntries(formData);

            try {
                const result = await api.updateProject(data);

                if (result.success) {
                    showAlert('تم تحديث المشروع بنجاح', 'success');

                    // Properly close modal and return focus
                    const modalElement = document.getElementById('editProjectModal');
                    const modalInstance = bootstrap.Modal.getInstance(modalElement);
                    if (modalInstance) {
                        modalInstance.hide();
                        setTimeout(() => {
                            document.querySelector('[data-bs-target="#editProjectModal"]').focus();
                        }, 100);
                    }

                    loadProjects();
                } else {
                    showAlert(result.message || 'حدث خطأ أثناء تحديث المشروع', 'danger');
                }
            } catch (error) {
                showAlert('حدث خطأ أثناء تحديث المشروع: ' + error.message, 'danger');
            }
        }

        /**
         * حذف المشروع
         */
        async function deleteProject(projectId) {
            if (!confirm('هل أنت متأكد من حذف هذا المشروع؟')) return;

            try {
                const result = await api.deleteProject(projectId);

                if (result.success) {
                    showAlert('تم حذف المشروع بنجاح', 'success');
                    loadProjects();
                } else {
                    showAlert(result.message || 'حدث خطأ أثناء حذف المشروع', 'danger');
                }
            } catch (error) {
                showAlert('حدث خطأ أثناء حذف المشروع: ' + error.message, 'danger');
            }
        }

        // تحميل المشاريع عند فتح الصفحة
        document.addEventListener('DOMContentLoaded', loadProjects);

        // Helper functions
        function showAlert(message, type = 'info') {
            const alertHtml = `
                <div class="alert alert-${type} alert-dismissible fade show" role="alert">
                    ${message}
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
            `;

            let container = document.getElementById('alertsContainer');
            if (!container) {
                container = document.createElement('div');
                container.id = 'alertsContainer';
                document.querySelector('.main-content').insertBefore(container, document.querySelector('.main-content').firstChild);
            }

            container.innerHTML = alertHtml;
            setTimeout(() => {
                container.innerHTML = '';
            }, 5000);
        }

        function formatDateArabic(dateString) {
            if (!dateString) return '';
            const date = new Date(dateString);
            const months = {
                '0': 'يناير', '1': 'فبراير', '2': 'مارس',
                '3': 'أبريل', '4': 'مايو', '5': 'يونيو',
                '6': 'يوليو', '7': 'أغسطس', '8': 'سبتمبر',
                '9': 'أكتوبر', '10': 'نوفمبر', '11': 'ديسمبر'
            };
            return `${date.getDate()} ${months[date.getMonth()]} ${date.getFullYear()}`;
        }

        function getStatusBadge(status) {
            const statuses = {
                'todo': { label: 'لم تبدأ', class: 'bg-secondary' },
                'in_progress': { label: 'قيد التنفيذ', class: 'bg-info' },
                'review': { label: 'قيد المراجعة', class: 'bg-warning' },
                'completed': { label: 'مكتملة', class: 'bg-success' },
                'planning': { label: 'التخطيط', class: 'bg-secondary' },
                'on_hold': { label: 'معلقة', class: 'bg-warning' }
            };
            const s = statuses[status] || statuses['todo'];
            return `<span class="badge ${s.class}">${s.label}</span>`;
        }
    </script>
</body>

</html>
