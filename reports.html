<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>التقارير - نظام إدارة المشاريع</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary sticky-top">
        <div class="container-fluid">
            <a class="navbar-brand" href="dashboard.html">
                <i class="fas fa-tasks"></i> نظام إدارة المشاريع
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle" href="#" id="userDropdown" role="button"
                            data-bs-toggle="dropdown">
                            <i class="fas fa-user-circle"></i> <span id="userName">المستخدم</span>
                        </a>
                        <ul class="dropdown-menu dropdown-menu-end" aria-labelledby="userDropdown">
                            <li><a class="dropdown-item" href="#" onclick="logout(); return false;"><i
                                        class="fas fa-sign-out-alt"></i> تسجيل الخروج</a></li>
                        </ul>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container-fluid">
        <div class="row">
            <!-- Sidebar -->
            <nav class="col-md-2 d-md-block bg-light sidebar">
                <div class="position-sticky pt-3">
                    <ul class="nav flex-column">
                        <li class="nav-item">
                            <a class="nav-link" href="dashboard.html">
                                <i class="fas fa-home"></i> الرئيسية
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="projects.html">
                                <i class="fas fa-project-diagram"></i> المشاريع
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="tasks.html">
                                <i class="fas fa-tasks"></i> المهام
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="team.html">
                                <i class="fas fa-users"></i> الفريق
                            </a>
                        </li>
                        <li class="nav-item active">
                            <a class="nav-link" href="reports.html">
                                <i class="fas fa-chart-bar"></i> التقارير
                            </a>
                        </li>
                    </ul>
                </div>
            </nav>

            <!-- Main Content -->
            <main class="col-md-10 ms-sm-auto px-md-4 main-content">
                <div class="d-flex justify-content-between align-items-center my-4">
                    <h1><i class="fas fa-chart-bar"></i> التقارير والإحصائيات</h1>
                </div>

                <!-- Summary Cards -->
                <div class="row mb-4">
                    <div class="col-md-3">
                        <div class="card text-white bg-primary">
                            <div class="card-body">
                                <h5 class="card-title">إجمالي المشاريع</h5>
                                <h2 id="totalProjects">-</h2>
                                <i class="fas fa-project-diagram fa-2x opacity-50"></i>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="card text-white bg-success">
                            <div class="card-body">
                                <h5 class="card-title">المهام المكتملة</h5>
                                <h2 id="completedTasks">-</h2>
                                <i class="fas fa-check-circle fa-2x opacity-50"></i>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="card text-white bg-warning">
                            <div class="card-body">
                                <h5 class="card-title">المهام قيد التنفيذ</h5>
                                <h2 id="inProgressTasks">-</h2>
                                <i class="fas fa-spinner fa-2x opacity-50"></i>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="card text-white bg-info">
                            <div class="card-body">
                                <h5 class="card-title">أعضاء الفريق</h5>
                                <h2 id="teamMembers">-</h2>
                                <i class="fas fa-users fa-2x opacity-50"></i>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Charts Section -->
                <div class="row mb-4">
                    <div class="col-md-6">
                        <div class="card">
                            <div class="card-header">
                                <h5><i class="fas fa-chart-pie"></i> حالة المشاريع</h5>
                            </div>
                            <div class="card-body">
                                <canvas id="projectStatusChart"></canvas>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="card">
                            <div class="card-header">
                                <h5><i class="fas fa-chart-bar"></i> حالة المهام</h5>
                            </div>
                            <div class="card-body">
                                <canvas id="taskStatusChart"></canvas>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Priority Distribution -->
                <div class="row">
                    <div class="col-md-12">
                        <div class="card">
                            <div class="card-header">
                                <h5><i class="fas fa-exclamation-triangle"></i> توزيع أولويات المهام</h5>
                            </div>
                            <div class="card-body">
                                <div id="priorityDistribution" class="text-center">
                                    <p class="text-muted">جاري التحميل...</p>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="js/api-client.js"></script>
    <script>
        let allProjects = [];
        let allTasks = [];
        let allUsers = [];

        async function loadReportsData() {
            try {
                const projectsResult = await api.getProjects();
                const tasksResult = await api.getTasks();
                const usersResult = await api.getUsers();

                if (projectsResult.success) allProjects = projectsResult.data;
                if (tasksResult.success) allTasks = tasksResult.data;
                if (usersResult.success) allUsers = usersResult.data;

                updateSummaryCards();
                renderProjectStatusChart();
                renderTaskStatusChart();
                renderPriorityDistribution();
            } catch (error) {
                console.error('Error loading reports:', error);
            }
        }

        function updateSummaryCards() {
            document.getElementById('totalProjects').textContent = allProjects.length;
            document.getElementById('completedTasks').textContent = allTasks.filter(t => t.status === 'completed').length;
            document.getElementById('inProgressTasks').textContent = allTasks.filter(t => t.status === 'in_progress').length;
            document.getElementById('teamMembers').textContent = allUsers.length;
        }

        function renderProjectStatusChart() {
            const statusCounts = {};
            allProjects.forEach(p => {
                statusCounts[p.status] = (statusCounts[p.status] || 0) + 1;
            });

            const ctx = document.getElementById('projectStatusChart').getContext('2d');
            new Chart(ctx, {
                type: 'pie',
                data: {
                    labels: Object.keys(statusCounts).map(s => getStatusLabel(s)),
                    datasets: [{
                        data: Object.values(statusCounts),
                        backgroundColor: ['#6c757d', '#0d6efd', '#198754', '#ffc107']
                    }]
                },
                options: {
                    responsive: true,
                    plugins: {
                        legend: { position: 'bottom' }
                    }
                }
            });
        }

        function renderTaskStatusChart() {
            const statusCounts = {};
            allTasks.forEach(t => {
                statusCounts[t.status] = (statusCounts[t.status] || 0) + 1;
            });

            const ctx = document.getElementById('taskStatusChart').getContext('2d');
            new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: Object.keys(statusCounts).map(s => getStatusLabel(s)),
                    datasets: [{
                        label: 'عدد المهام',
                        data: Object.values(statusCounts),
                        backgroundColor: ['#6c757d', '#0dcaf0', '#ffc107', '#198754']
                    }]
                },
                options: {
                    responsive: true,
                    plugins: {
                        legend: { display: false }
                    },
                    scales: {
                        y: { beginAtZero: true }
                    }
                }
            });
        }

        function renderPriorityDistribution() {
            const priorityCounts = {};
            allTasks.forEach(t => {
                priorityCounts[t.priority] = (priorityCounts[t.priority] || 0) + 1;
            });

            const priorities = ['urgent', 'high', 'medium', 'low'];
            const colors = { 'urgent': 'danger', 'high': 'warning', 'medium': 'info', 'low': 'success' };

            const html = `
                <div class="row">
                    ${priorities.map(p => `
                        <div class="col-md-3">
                            <div class="alert alert-${colors[p]}">
                                <h5>${getPriorityLabel(p)}</h5>
                                <h3>${priorityCounts[p] || 0}</h3>
                            </div>
                        </div>
                    `).join('')}
                </div>
            `;

            document.getElementById('priorityDistribution').innerHTML = html;
        }

        function getStatusLabel(status) {
            const labels = {
                'planning': 'في مرحلة التخطيط',
                'in_progress': 'قيد التنفيذ',
                'completed': 'مكتملة',
                'on_hold': 'معلقة',
                'todo': 'لم تبدأ',
                'review': 'قيد المراجعة'
            };
            return labels[status] || status;
        }

        function getPriorityLabel(priority) {
            const labels = {
                'urgent': 'عاجلة',
                'high': 'عالية',
                'medium': 'متوسطة',
                'low': 'منخفضة'
            };
            return labels[priority] || priority;
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            loadReportsData();

            const user = getCurrentUser();
            if (user) {
                document.getElementById('userName').textContent = user.name || 'المستخدم';
            }
        });
    </script>
</body>

</html>
