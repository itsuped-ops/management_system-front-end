<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام إدارة المشاريع والمهام - تسجيل الدخول</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .auth-container {
            width: 100%;
            max-width: 450px;
            padding: 20px;
        }

        .auth-card {
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            overflow: hidden;
            animation: slideUp 0.5s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .auth-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 30px;
            text-align: center;
            color: white;
        }

        .auth-header h1 {
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .auth-header p {
            font-size: 14px;
            opacity: 0.9;
        }

        .auth-body {
            padding: 30px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
            display: block;
        }

        .form-control {
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            padding: 12px 15px;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        .form-control:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 0.2rem rgba(102, 126, 234, 0.25);
            outline: none;
        }

        .form-control::placeholder {
            color: #999;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            padding: 12px;
            font-weight: 600;
            border-radius: 8px;
            transition: all 0.3s ease;
            width: 100%;
            font-size: 16px;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .toggle-form {
            text-align: center;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #e0e0e0;
        }

        .toggle-form p {
            color: #666;
            font-size: 14px;
            margin-bottom: 0;
        }

        .toggle-form a {
            color: #667eea;
            font-weight: 600;
            text-decoration: none;
            cursor: pointer;
        }

        .toggle-form a:hover {
            text-decoration: underline;
        }

        .alert {
            border-radius: 8px;
            border: none;
            margin-bottom: 20px;
        }

        .form-icon {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #667eea;
        }

        .input-group {
            position: relative;
        }

        .input-group .form-control {
            padding-right: 45px;
        }

        .hidden-form {
            display: none;
        }

        .loading {
            display: none;
        }

        .loading.active {
            display: inline-block;
        }

        .form-section {
            animation: fadeIn 0.3s ease-in;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        .logo {
            font-size: 40px;
            margin-bottom: 10px;
        }

        .register-fields {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .register-fields .form-group {
            margin-bottom: 0;
        }

        .register-fields.full {
            grid-template-columns: 1fr;
        }

        @media (max-width: 576px) {
            .auth-container {
                max-width: 100%;
            }

            .register-fields {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>
    <div class="auth-container">
        <div class="auth-card">
            <!-- Login Form -->
            <div id="loginForm" class="form-section">
                <div class="auth-header">
                    <div class="logo">
                        <i class="fas fa-tasks"></i>
                    </div>
                    <h1>نظام إدارة المشاريع</h1>
                    <p>تسجيل الدخول إلى حسابك</p>
                </div>
                <div class="auth-body">
                    <div id="loginAlert"></div>
                    <form id="loginFormElement">
                        <div class="form-group">
                            <label class="form-label" for="loginEmail">
                                <i class="fas fa-envelope"></i> البريد الإلكتروني
                            </label>
                            <input type="email" class="form-control" id="loginEmail" name="email"
                                placeholder="أدخل بريدك الإلكتروني" required>
                        </div>

                        <div class="form-group">
                            <label class="form-label" for="loginPassword">
                                <i class="fas fa-lock"></i> كلمة المرور
                            </label>
                            <input type="password" class="form-control" id="loginPassword" name="password"
                                placeholder="أدخل كلمة المرور" required>
                        </div>

                        <button type="submit" class="btn btn-primary">
                            <span>تسجيل الدخول</span>
                            <span class="loading">
                                <i class="fas fa-spinner fa-spin"></i>
                            </span>
                        </button>
                    </form>

                    <div class="toggle-form">
                        <p>ليس لديك حساب؟ <a onclick="toggleForms()">إنشاء حساب جديد</a></p>
                    </div>
                </div>
            </div>

            <!-- Register Form -->
            <div id="registerForm" class="form-section hidden-form">
                <div class="auth-header">
                    <div class="logo">
                        <i class="fas fa-user-plus"></i>
                    </div>
                    <h1>إنشاء حساب جديد</h1>
                    <p>انضم إلى نظام إدارة المشاريع</p>
                </div>
                <div class="auth-body">
                    <div id="registerAlert"></div>
                    <form id="registerFormElement">
                        <div class="register-fields">
                            <div class="form-group">
                                <label class="form-label" for="companyName">
                                    <i class="fas fa-building"></i> اسم الشركة
                                </label>
                                <input type="text" class="form-control" id="companyName" name="company_name"
                                    placeholder="اسم الشركة" required>
                            </div>

                            <div class="form-group">
                                <label class="form-label" for="companyEmail">
                                    <i class="fas fa-envelope"></i> بريد الشركة
                                </label>
                                <input type="email" class="form-control" id="companyEmail" name="company_email"
                                    placeholder="بريد الشركة" required>
                            </div>
                        </div>

                        <div class="register-fields">
                            <div class="form-group">
                                <label class="form-label" for="userName">
                                    <i class="fas fa-user"></i> اسمك
                                </label>
                                <input type="text" class="form-control" id="userName" name="user_name"
                                    placeholder="اسمك الكامل" required>
                            </div>

                            <div class="form-group">
                                <label class="form-label" for="userEmail">
                                    <i class="fas fa-envelope"></i> بريدك الإلكتروني
                                </label>
                                <input type="email" class="form-control" id="userEmail" name="user_email"
                                    placeholder="بريدك الإلكتروني" required>
                            </div>
                        </div>

                        <div class="register-fields">
                            <div class="form-group">
                                <label class="form-label" for="registerPassword">
                                    <i class="fas fa-lock"></i> كلمة المرور
                                </label>
                                <input type="password" class="form-control" id="registerPassword" name="password"
                                    placeholder="كلمة المرور" required>
                            </div>

                            <div class="form-group">
                                <label class="form-label" for="confirmPassword">
                                    <i class="fas fa-lock"></i> تأكيد كلمة المرور
                                </label>
                                <input type="password" class="form-control" id="confirmPassword" name="confirm_password"
                                    placeholder="تأكيد كلمة المرور" required>
                            </div>
                        </div>

                        <button type="submit" class="btn btn-primary">
                            <span>إنشاء الحساب</span>
                            <span class="loading">
                                <i class="fas fa-spinner fa-spin"></i>
                            </span>
                        </button>
                    </form>

                    <div class="toggle-form">
                        <p>لديك حساب بالفعل؟ <a onclick="toggleForms()">تسجيل الدخول</a></p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/api-client.js"></script>
    <script>
        // تبديل بين نماذج تسجيل الدخول والتسجيل
        function toggleForms() {
            const loginForm = document.getElementById('loginForm');
            const registerForm = document.getElementById('registerForm');

            loginForm.classList.toggle('hidden-form');
            registerForm.classList.toggle('hidden-form');

            // مسح الرسائل
            document.getElementById('loginAlert').innerHTML = '';
            document.getElementById('registerAlert').innerHTML = '';
        }

        // عرض رسالة تنبيه
        function showAlert(elementId, message, type = 'danger') {
            const alertElement = document.getElementById(elementId);
            alertElement.innerHTML = `
                <div class="alert alert-${type} alert-dismissible fade show" role="alert">
                    <i class="fas fa-${type === 'danger' ? 'exclamation-circle' : 'check-circle'}"></i>
                    ${message}
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
            `;
        }

        // معالجة نموذج تسجيل الدخول
        document.getElementById('loginFormElement').addEventListener('submit', async (e) => {
            e.preventDefault();

            const button = e.target.querySelector('button[type="submit"]');
            const loading = button.querySelector('.loading');
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;

            button.disabled = true;
            loading.classList.add('active');

            try {
                const response = await api.login(email, password);

                if (response.success) {
                    showAlert('loginAlert', 'تم تسجيل الدخول بنجاح! جاري التحويل...', 'success');
                    setTimeout(() => {
                        window.location.href = 'dashboard.html';
                    }, 1500);
                } else {
                    showAlert('loginAlert', response.message || 'حدث خطأ أثناء تسجيل الدخول', 'danger');
                }
            } catch (error) {
                showAlert('loginAlert', 'حدث خطأ في الاتصال: ' + error.message, 'danger');
            } finally {
                button.disabled = false;
                loading.classList.remove('active');
            }
        });

        // معالجة نموذج التسجيل
        document.getElementById('registerFormElement').addEventListener('submit', async (e) => {
            e.preventDefault();

            const button = e.target.querySelector('button[type="submit"]');
            const loading = button.querySelector('.loading');

            const companyName = document.getElementById('companyName').value;
            const companyEmail = document.getElementById('companyEmail').value;
            const userName = document.getElementById('userName').value;
            const userEmail = document.getElementById('userEmail').value;
            const password = document.getElementById('registerPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            button.disabled = true;
            loading.classList.add('active');

            try {
                const response = await api.register(companyName, companyEmail, userName, userEmail, password, confirmPassword);

                if (response.success) {
                    showAlert('registerAlert', 'تم إنشاء الحساب بنجاح! جاري التحويل...', 'success');
                    setTimeout(() => {
                        window.location.href = 'dashboard.html';
                    }, 1500);
                } else if (response.errors) {
                    showAlert('registerAlert', response.errors.map(e => e.message).join('<br>'), 'danger');
                } else {
                    showAlert('registerAlert', response.message || 'حدث خطأ أثناء التسجيل', 'danger');
                }
            } catch (error) {
                showAlert('registerAlert', 'حدث خطأ في الاتصال: ' + error.message, 'danger');
            } finally {
                button.disabled = false;
                loading.classList.remove('active');
            }
        });

        // التحقق من معاملات URL
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.get('timeout') === '1') {
            showAlert('loginAlert', 'انتهت جلستك، يرجى تسجيل الدخول مرة أخرى', 'warning');
        }
    </script>
</body>

</html>
