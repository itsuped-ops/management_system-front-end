<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المهام - نظام إدارة المشاريع</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary sticky-top">
        <div class="container-fluid">
            <a class="navbar-brand" href="dashboard.html">
                <i class="fas fa-tasks"></i> نظام إدارة المشاريع
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle" href="#" id="userDropdown" role="button"
                            data-bs-toggle="dropdown">
                            <i class="fas fa-user-circle"></i> <span id="userName">المستخدم</span>
                        </a>
                        <ul class="dropdown-menu dropdown-menu-end" aria-labelledby="userDropdown">
                            <li><a class="dropdown-item" href="#" onclick="logout(); return false;"><i
                                        class="fas fa-sign-out-alt"></i> تسجيل الخروج</a></li>
                        </ul>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container-fluid">
        <div class="row">
            <!-- Sidebar -->
            <nav class="col-md-2 d-md-block bg-light sidebar">
                <div class="position-sticky pt-3">
                    <ul class="nav flex-column">
                        <li class="nav-item">
                            <a class="nav-link" href="dashboard.html">
                                <i class="fas fa-home"></i> الرئيسية
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="projects.html">
                                <i class="fas fa-project-diagram"></i> المشاريع
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link active" href="tasks.html">
                                <i class="fas fa-tasks"></i> المهام
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="team.html">
                                <i class="fas fa-users"></i> الفريق
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="reports.html">
                                <i class="fas fa-chart-bar"></i> التقارير
                            </a>
                        </li>
                    </ul>
                </div>
            </nav>

            <!-- Main Content -->
            <main class="col-md-10 ms-sm-auto px-md-4 main-content">
                <div class="d-flex justify-content-between align-items-center my-4">
                    <h1><i class="fas fa-tasks"></i> المهام</h1>
                    <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#newTaskModal">
                        <i class="fas fa-plus"></i> مهمة جديدة
                    </button>
                </div>

                <!-- Filters -->
                <div class="row mb-4">
                    <div class="col-md-3">
                        <select class="form-select" id="projectFilter" onchange="filterTasks()">
                            <option value="">جميع المشاريع</option>
                        </select>
                    </div>
                    <div class="col-md-3">
                        <select class="form-select" id="statusFilter" onchange="filterTasks()">
                            <option value="">جميع الحالات</option>
                            <option value="todo">لم تبدأ</option>
                            <option value="in_progress">قيد التنفيذ</option>
                            <option value="review">قيد المراجعة</option>
                            <option value="completed">مكتملة</option>
                        </select>
                    </div>
                    <div class="col-md-3">
                        <select class="form-select" id="priorityFilter" onchange="filterTasks()">
                            <option value="">جميع الأولويات</option>
                            <option value="low">منخفضة</option>
                            <option value="medium">متوسطة</option>
                            <option value="high">عالية</option>
                            <option value="urgent">عاجلة</option>
                        </select>
                    </div>
                </div>

                <!-- Tasks Table -->
                <div class="card">
                    <div class="table-responsive">
                        <table class="table table-hover mb-0">
                            <thead>
                                <tr>
                                    <th><i class="fas fa-tasks"></i> المهمة</th>
                                    <th><i class="fas fa-project-diagram"></i> المشروع</th>
                                    <th><i class="fas fa-flag"></i> الأولوية</th>
                                    <th><i class="fas fa-clock"></i> الموعد</th>
                                    <th><i class="fas fa-spinner"></i> الحالة</th>
                                    <th><i class="fas fa-cogs"></i> الإجراءات</th>
                                </tr>
                            </thead>
                            <tbody id="tasksTable">
                                <tr>
                                    <td colspan="6" class="text-center text-muted">جاري التحميل...</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <!-- New Task Modal -->
    <div class="modal fade" id="newTaskModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title"><i class="fas fa-plus"></i> مهمة جديدة</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="newTaskForm">
                        <div class="mb-3">
                            <label class="form-label">المشروع</label>
                            <select class="form-select" name="project_id" required id="newTaskProject">
                                <option value="">اختر مشروع</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">عنوان المهمة</label>
                            <input type="text" class="form-control" name="task_title" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">الوصف</label>
                            <textarea class="form-control" name="description" rows="3"></textarea>
                        </div>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">الأولوية</label>
                                <select class="form-select" name="priority">
                                    <option value="low">منخفضة</option>
                                    <option value="medium" selected>متوسطة</option>
                                    <option value="high">عالية</option>
                                    <option value="urgent">عاجلة</option>
                                </select>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">الموعد</label>
                                <input type="date" class="form-control" name="deadline" required>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">الموكل إليه</label>
                            <select class="form-select" name="assigned_to" id="newTaskAssignee">
                                <option value="0">لم يتم التعيين</option>
                            </select>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">إلغاء</button>
                    <button type="button" class="btn btn-primary" onclick="createTask()">
                        <i class="fas fa-save"></i> إنشاء المهمة
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/api-client.js"></script>
    <script>
        let allTasks = [];
        let allProjects = [];
        let allUsers = [];

        /**
         * تحميل البيانات الأولية
         */
        async function loadInitialData() {
            // تحميل المشاريع
            try {
                const projectsResult = await api.getProjects();
                if (projectsResult.success) {
                    allProjects = projectsResult.data;
                    populateProjectSelects();
                }
            } catch (error) {
                console.error('Error loading projects:', error);
            }

            // تحميل المستخدمين
            try {
                const usersResult = await api.getUsers();
                if (usersResult.success) {
                    allUsers = usersResult.data;
                    populateUserSelect();
                }
            } catch (error) {
                console.error('Error loading users:', error);
            }

            // تحميل المهام
            loadTasks();
        }

        /**
         * ملء قوائم المشاريع
         */
        function populateProjectSelects() {
            const filterSelect = document.getElementById('projectFilter');
            const newTaskSelect = document.getElementById('newTaskProject');

            allProjects.forEach(project => {
                const option = document.createElement('option');
                option.value = project.project_id;
                option.textContent = project.project_name;
                newTaskSelect.appendChild(option);

                const filterOption = option.cloneNode(true);
                filterSelect.appendChild(filterOption);
            });
        }

        /**
         * ملء قائمة المستخدمين
         */
        function populateUserSelect() {
            const select = document.getElementById('newTaskAssignee');
            allUsers.forEach(user => {
                const option = document.createElement('option');
                option.value = user.user_id;
                option.textContent = user.name;
                select.appendChild(option);
            });
        }

        /**
         * تحميل المهام
         */
        async function loadTasks() {
            try {
                const result = await api.getTasks();
                if (result.success) {
                    allTasks = result.data;
                    displayTasks(allTasks);
                }
            } catch (error) {
                console.error('Error loading tasks:', error);
            }
        }

        /**
         * عرض المهام
         */
        function displayTasks(tasks) {
            const tbody = document.getElementById('tasksTable');

            if (tasks.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" class="text-center text-muted">لا توجد مهام</td></tr>';
                return;
            }

            tbody.innerHTML = tasks.map(task => {
                const daysRemaining = getDaysRemaining(task.deadline);
                const isOverdue = daysRemaining < 0;

                return `
                    <tr>
                        <td>
                            <strong>${task.task_title}</strong>
                            <br>
                            <small class="text-muted">${task.description || ''}</small>
                        </td>
                        <td>${task.project_name || 'بدون مشروع'}</td>
                        <td>${getPriorityBadge(task.priority)}</td>
                        <td>
                            <small ${isOverdue ? 'class="text-danger"' : ''}>
                                ${formatDateArabic(task.deadline)}
                                ${isOverdue ? `<span class="text-danger d-block"><i class="fas fa-exclamation-circle"></i> متأخرة بـ ${Math.abs(daysRemaining)} يوم</span>` : ''}
                            </small>
                        </td>
                        <td>${getStatusBadge(task.status)}</td>
                        <td>
                            <div class="btn-group btn-group-sm" role="group">
                                <button type="button" class="btn btn-outline-primary" onclick="editTask(${task.task_id})">
                                    <i class="fas fa-edit"></i>
                                </button>
                                <button type="button" class="btn btn-outline-success" onclick="completeTask(${task.task_id})">
                                    <i class="fas fa-check"></i>
                                </button>
                                <button type="button" class="btn btn-outline-danger" onclick="deleteTask(${task.task_id})">
                                    <i class="fas fa-trash"></i>
                                </button>
                            </div>
                        </td>
                    </tr>
                `;
            }).join('');
        }

        /**
         * تصفية المهام
         */
        function filterTasks() {
            const projectId = document.getElementById('projectFilter').value;
            const status = document.getElementById('statusFilter').value;
            const priority = document.getElementById('priorityFilter').value;

            let filtered = allTasks;

            if (projectId) {
                filtered = filtered.filter(t => t.project_id == projectId);
            }
            if (status) {
                filtered = filtered.filter(t => t.status === status);
            }
            if (priority) {
                filtered = filtered.filter(t => t.priority === priority);
            }

            displayTasks(filtered);
        }

        /**
         * إنشاء مهمة جديدة
         */
        async function createTask() {
            const form = document.getElementById('newTaskForm');
            const formData = new FormData(form);
            const data = Object.fromEntries(formData);

            // Validate required fields
            if (!data.project_id) {
                showAlert('يرجى اختيار المشروع', 'danger');
                return;
            }

            if (!data.task_title) {
                showAlert('يرجى إدخال عنوان المهمة', 'danger');
                return;
            }

            if (!data.deadline) {
                showAlert('يرجى اختيار الموعد النهائي', 'danger');
                return;
            }

            // Convert assigned_to to proper value
            if (data.assigned_to === '0' || data.assigned_to === '') {
                data.assigned_to = null;
            }

            // Set default status and priority if not provided
            if (!data.status) {
                data.status = 'todo';
            }

            if (!data.priority) {
                data.priority = 'medium';
            }

            try {
                console.log('Creating task with data:', data);
                const result = await api.createTask(data);

                if (result.success) {
                    showAlert('تم إنشاء المهمة بنجاح', 'success');
                    form.reset();

                    // Properly close modal and return focus
                    const modalElement = document.getElementById('newTaskModal');
                    const modalInstance = bootstrap.Modal.getInstance(modalElement);
                    if (modalInstance) {
                        modalInstance.hide();
                        // Return focus to the button that opened the modal
                        setTimeout(() => {
                            document.querySelector('[data-bs-target="#newTaskModal"]').focus();
                        }, 100);
                    }

                    loadTasks();
                } else {
                    console.error('Create task error:', result.message);
                    showAlert(result.message || 'حدث خطأ أثناء إنشاء المهمة', 'danger');
                }
            } catch (error) {
                console.error('Create task exception:', error);
                showAlert('حدث خطأ أثناء إنشاء المهمة: ' + error.message, 'danger');
            }
        }

        /**
         * حذف مهمة
         */
        async function deleteTask(taskId) {
            if (!confirm('هل أنت متأكد من حذف هذه المهمة؟')) return;

            try {
                const result = await api.deleteTask(taskId);

                if (result.success) {
                    showAlert('تم حذف المهمة بنجاح', 'success');
                    loadTasks();
                } else {
                    showAlert(result.message || 'حدث خطأ أثناء حذف المهمة', 'danger');
                }
            } catch (error) {
                showAlert('حدث خطأ أثناء حذف المهمة: ' + error.message, 'danger');
            }
        }

        /**
         * إكمال مهمة
         */
        async function completeTask(taskId) {
            try {
                const result = await api.changeTaskStatus(taskId, 'completed');

                if (result.success) {
                    showAlert('تم تحديث حالة المهمة', 'success');
                    loadTasks();
                } else {
                    showAlert(result.message || 'حدث خطأ أثناء تحديث الحالة', 'danger');
                }
            } catch (error) {
                showAlert('حدث خطأ أثناء تحديث الحالة: ' + error.message, 'danger');
            }
        }

        /**
         * تعديل مهمة
         */
        async function editTask(taskId) {
            const task = allTasks.find(t => t.task_id === taskId);
            if (!task) return;

            // Simple prompt for editing (can be improved with modal)
            const newTitle = prompt('عنوان المهمة:', task.task_title);
            if (!newTitle) return;

            try {
                const result = await api.updateTask({
                    task_id: taskId,
                    task_title: newTitle
                });

                if (result.success) {
                    showAlert('تم تحديث المهمة بنجاح', 'success');
                    loadTasks();
                } else {
                    showAlert(result.message || 'حدث خطأ أثناء تحديث المهمة', 'danger');
                }
            } catch (error) {
                showAlert('حدث خطأ أثناء تحديث المهمة: ' + error.message, 'danger');
            }
        }

        // تحميل البيانات عند فتح الصفحة
        document.addEventListener('DOMContentLoaded', loadInitialData);

        // Helper functions
        function showAlert(message, type = 'info') {
            const alertHtml = `
                <div class="alert alert-${type} alert-dismissible fade show" role="alert">
                    ${message}
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
            `;

            let container = document.getElementById('alertsContainer');
            if (!container) {
                container = document.createElement('div');
                container.id = 'alertsContainer';
                document.querySelector('.main-content').insertBefore(container, document.querySelector('.main-content').firstChild);
            }

            container.innerHTML = alertHtml;
            setTimeout(() => {
                container.innerHTML = '';
            }, 5000);
        }

        function formatDateArabic(dateString) {
            if (!dateString) return '';
            const date = new Date(dateString);
            const months = {
                '0': 'يناير', '1': 'فبراير', '2': 'مارس',
                '3': 'أبريل', '4': 'مايو', '5': 'يونيو',
                '6': 'يوليو', '7': 'أغسطس', '8': 'سبتمبر',
                '9': 'أكتوبر', '10': 'نوفمبر', '11': 'ديسمبر'
            };
            return `${date.getDate()} ${months[date.getMonth()]} ${date.getFullYear()}`;
        }

        function getDaysRemaining(deadline) {
            if (!deadline) return 0;
            const today = new Date();
            const deadlineDate = new Date(deadline);
            const diffTime = deadlineDate - today;
            const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
            return diffDays;
        }

        function getPriorityBadge(priority) {
            const priorities = {
                'low': { label: 'منخفضة', class: 'bg-success' },
                'medium': { label: 'متوسطة', class: 'bg-info' },
                'high': { label: 'عالية', class: 'bg-warning' },
                'urgent': { label: 'عاجلة', class: 'bg-danger' }
            };
            const p = priorities[priority] || priorities['medium'];
            return `<span class="badge ${p.class}">${p.label}</span>`;
        }

        function getStatusBadge(status) {
            const statuses = {
                'todo': { label: 'لم تبدأ', class: 'bg-secondary' },
                'in_progress': { label: 'قيد التنفيذ', class: 'bg-info' },
                'review': { label: 'قيد المراجعة', class: 'bg-warning' },
                'completed': { label: 'مكتملة', class: 'bg-success' },
                'planning': { label: 'التخطيط', class: 'bg-secondary' },
                'on_hold': { label: 'معلقة', class: 'bg-warning' }
            };
            const s = statuses[status] || statuses['todo'];
            return `<span class="badge ${s.class}">${s.label}</span>`;
        }
    </script>
</body>

</html>
